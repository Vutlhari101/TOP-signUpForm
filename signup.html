<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign up</title>
    <link rel="stylesheet" href="styling/style.css">
</head>

<body>
    <div class="container">
        <div class="banner">
            <div class="strip"><span class="logo"><img src="https://raw.githubusercontent.com/TheOdinProject/curriculum/5f37d43908ef92499e95a9b90fc3cc291a95014c/html_css/project-sign-up-form/odin-lined.png"></span>ODIN</div>
        </div>
    </div> 

    <div class="form">
        <div class="brief">
            <p>This is not a real online service! You know
                you need something like this in your life to help you
                realize your deepest dreams.
            </p>
            <p>Sign up <em>now</em> to get started.</p>
            <br>
            <p>You <em>know</em> you want to.</p>

            <form action="#" method="get">
                <fieldset>
                    <legend>Let's do this!</legend>

                    <div class="left">
                        <div>
                            <label for="fName">FIRST NAME</label>
                            <input type="text" name="fName" id="fName" placeholder="John">
                        </div>

                        <div>
                            <label for="email">EMAIL</label>
                            <input type="text" name="email" id="email" placeholder="email@domain">
                        </div>

                        <div>
                            <label for="password">PASSWORD</label>
                            <input type="password" name="password" id="password">
                        </div>
                    </div>

                    <div class="right">
                        <div>
                            <label for="lName">LAST NAME</label>
                            <input type="text" name="lName" id="lName" placeholder="Smith">
                        </div>

                        <div>
                            <label for="phone">PHONE NUMBER</label>
                            <input type="text" name="phone" id="phone" minlength="10" placeholder="012 345 5676">
                        </div>

                        <div>
                            <label for="confPAss">CONFIRM PASSWORD</label>
                            <input type="password" name="confPAss" id="confPAss">
                        </div>
                    </div>


                </fieldset>

                <button type="submit">Create Account</button>
                <p>Already have an account? <a href="#">Log in</a></p>
            </form>
        </div>
    </div>
</body>

</html>
